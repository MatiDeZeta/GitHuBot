name: Bug report
description: Something broken in Discord commands, webhooks, or message formatting
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve GitHuBot. Fill in as much as you can — signature failures and formatting bugs are much easier to fix with environment details.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Where did you hit the problem?
      options:
        - Slash commands (/repo)
        - Webhook receive / signature verify
        - Event message formatting (Components V2)
        - Database / persistence
        - Deploy (Railway / Docker)
        - Docs / README
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
      placeholder: Clear, concise summary of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps someone else can follow.
      placeholder: |
        1. Run `/repo add …`
        2. Deliver a push webhook
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error text, screenshots, or log snippets if you have them. Redact secrets.
    validations:
      required: true

  - type: dropdown
    id: hosting
    attributes:
      label: Hosting
      options:
        - Railway
        - Docker / docker-compose
        - Local (`pnpm dev`)
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: GitHuBot version
      description: Tag or commit (e.g. `v1.0.1` or short SHA).
      placeholder: v1.0.1
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 22.x
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I did not paste webhook secrets, `MASTER_KEY`, or Discord tokens.
          required: true
